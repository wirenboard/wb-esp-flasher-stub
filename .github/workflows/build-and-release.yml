---
name: Build and release

on:
  push:
    branches:
      - '**'
    tags:
      - 'v*'
  pull_request:
  workflow_dispatch:

jobs:
  build_stubs:
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout ref commit
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential cmake ninja-build

      - name: Set up Python 3.13
        uses: actions/setup-python@v5
        with:
          python-version: '3.13'

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pyelftools

      - name: Cache toolchains
        uses: actions/cache@v4
        with:
          path: toolchains
          key: ${{ runner.os }}-toolchains-${{ hashFiles('tools/setup_toolchains.sh') }}

      - name: Install toolchains
        shell: bash
        run: |
          mkdir -p toolchains
          pushd toolchains
          ../tools/setup_toolchains.sh
          popd

      - name: Build stubs for all chips
        shell: bash
        run: |
          source ./tools/export_toolchains.sh
          ./tools/build_all_chips.sh

      - name: Upload stub JSONs
        uses: actions/upload-artifact@v4
        with:
          name: stub-jsons
          path: |
            build-*/esp*.json
            !build-*/*.base.json
          if-no-files-found: error
          retention-days: 7

  release:
    name: Publish release
    needs: build_stubs
    if: startsWith(github.ref, 'refs/tags/') || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-24.04
    permissions:
      contents: write
    steps:
      - name: Download stub JSONs
        uses: actions/download-artifact@v4
        with:
          name: stub-jsons
          path: stub-jsons

      - name: Publish tagged release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: ${{ github.ref_name }}
          draft: false
          prerelease: false
          generate_release_notes: true
          fail_on_unmatched_files: true
          files: |
            stub-jsons/**/esp*.json
            !stub-jsons/**/*.base.json

      - name: Publish rolling latest prerelease
        if: github.event_name == 'workflow_dispatch' && !startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          tag_name: latest
          name: Latest build (${{ github.sha }})
          draft: false
          prerelease: true
          generate_release_notes: true
          fail_on_unmatched_files: true
          files: |
            stub-jsons/**/esp*.json
            !stub-jsons/**/*.base.json
